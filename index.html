<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト差分比較ツール｜Diffチェック（文字・行・単語）無料オンライン</title>
    <meta name="description" content="テキスト差分を比較できる無料オンラインDiffツール。2つのテキストの差異を単語・行・文字単位でハイライト表示し、変更箇所をわかりやすく可視化します。ファイル読み込みにも対応。">
    
    <!-- 外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        addBg: '#dcfce7', addText: '#166534', 
                        remBg: '#fee2e2', remText: '#991b1b', 
                        darkAddBg: '#065f46', darkAddText: '#a7f3d0', 
                        darkRemBg: '#991b1b', darkRemText: '#fecaca' 
                    } 
                } 
            } 
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        textarea::-webkit-scrollbar { width: 8px; height: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark textarea::-webkit-scrollbar-thumb { background: #475569; }
        .diff-added { background-color: #dcfce7; color: #166534; font-weight: bold; border-radius: 2px; padding: 0 2px; }
        .diff-removed { background-color: #fee2e2; color: #991b1b; text-decoration: line-through; border-radius: 2px; padding: 0 2px; opacity: 0.8; }
        .dark .diff-added { background-color: #065f46; color: #a7f3d0; }
        .dark .diff-removed { background-color: #991b1b; color: #fecaca; }
        .diff-focus { outline: 3px solid #3b82f6; outline-offset: 2px; position: relative; z-index: 10; border-radius: 2px; }
        label:has(input:disabled) { cursor: not-allowed; opacity: 0.5; }
        @media (min-width: 768px) { textarea { resize: vertical; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme'in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-blue-600 dark:text-blue-400">テキスト差分比較ツール</h1>
            <div class="flex items-center space-x-4 text-sm">
                <div class="flex items-center space-x-2">
                    <select id="diff-unit" onchange="handleDiffUnitChange()" class="bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-1.5 outline-none cursor-pointer font-bold">
                        <option value="words" selected>単語単位</option>
                        <option value="lines">行単位</option>
                        <option value="chars">文字単位</option>
                    </select>
                    <label class="text-xs flex items-center gap-1.5 cursor-pointer text-gray-600 dark:text-gray-300 whitespace-nowrap">
                        <input type="checkbox" id="diff-space" onchange="compareText(true)" class="rounded-sm w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                        空白を差分に含める
                    </label>
                </div>
                <button onclick="toggleDarkMode()" aria-label="ダークモード切替" class="p-1.5 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">🌓</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="lg:flex lg:gap-8">
            <!-- ===== メインコンテンツ ===== -->
            <main class="flex-1">
                <div class="flex flex-col md:flex-row gap-6 mb-8 relative">
                    <div class="flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-bold text-red-600 dark:text-red-400 text-sm">変更前 (Original)</label>
                            <label class="cursor-pointer text-[11px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-300 px-2 py-1 rounded border border-blue-200 dark:border-blue-800 font-bold hover:bg-blue-100 transition">
                                + ファイル読込
                                <input type="file" class="hidden" accept=".txt,.csv,.md,.docx,.pdf" onchange="handleFileInput(event, 'original')">
                            </label>
                        </div>
                        <textarea id="original" rows="12" class="w-full p-4 border border-gray-300 rounded-lg dark:bg-gray-800 dark:border-gray-600 font-mono text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="比較元のテキストを貼り付け"></textarea>
                        <div id="count-original" class="text-right text-[11px] text-gray-500 mt-1 font-mono">0 文字</div>
                    </div>

                    <div class="flex justify-center items-center">
                        <button onclick="swapText()" title="左右のテキストを入れ替える" class="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-full p-2.5 hover:bg-gray-100 dark:hover:bg-gray-600 shadow-sm transition transform active:scale-95">
                            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        </button>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-bold text-green-600 dark:text-green-400 text-sm">変更後 (Modified)</label>
                            <label class="cursor-pointer text-[11px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-300 px-2 py-1 rounded border border-blue-200 dark:border-blue-800 font-bold hover:bg-blue-100 transition">
                                + ファイル読込
                                <input type="file" class="hidden" accept=".txt,.csv,.md,.docx,.pdf" onchange="handleFileInput(event, 'modified')">
                            </label>
                        </div>
                        <textarea id="modified" rows="12" class="w-full p-4 border border-gray-300 rounded-lg dark:bg-gray-800 dark:border-gray-600 font-mono text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="比較先のテキストを貼り付け"></textarea>
                        <div id="count-modified" class="text-right text-[11px] text-gray-500 mt-1 font-mono">0 文字</div>
                    </div>
                </div>

                <div class="flex justify-center space-x-4 mb-10">
                    <button onclick="clearText()" class="px-6 py-2.5 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg font-bold hover:bg-gray-300 dark:hover:bg-gray-600 transition">クリア</button>
                    <button onclick="compareText(false)" class="px-12 py-2.5 bg-blue-600 text-white rounded-lg font-bold shadow-lg hover:bg-blue-700 transition transform hover:-translate-y-0.5 active:translate-y-0">差分を比較する</button>
                </div>
                
                <!-- 広告枠 (モバイル用) -->
                <div class="lg:hidden mb-10 text-center min-h-[120px] flex justify-center items-center">
                    <div class="admax-ads" data-admax-id="94ad7c62ffd8d5aead85cad7709ba4c4" style="display:inline-block;"></div>
                    <script type="text/javascript">(admaxads = window.admaxads ||[]).push({admax_id: "94ad7c62ffd8d5aead85cad7709ba4c4",type: "banner"});</script>
                    <script type="text/javascript" charset="utf-8" src="https://adm.shinobi.jp/st/t.js" async></script>
                </div>

                <div id="result-container" class="hidden bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-md overflow-hidden transition-all">
                    <div class="px-6 py-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex flex-wrap justify-between items-center gap-4">
                        <h2 class="font-bold flex items-center">比較結果 <span id="auto-sync-status" class="ml-3 text-[10px] bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-0.5 rounded-full font-normal hidden"></span></h2>
                        <div class="flex items-center space-x-4">
                            <div id="badge-summary" class="text-xs font-bold flex space-x-3">
                                <span id="badge-removed" class="text-red-500 border border-red-200 bg-red-50 dark:bg-red-900/20 px-2 py-0.5 rounded"></span>
                                <span id="badge-added" class="text-green-600 border border-green-200 bg-green-50 dark:bg-green-900/20 px-2 py-0.5 rounded"></span>
                            </div>
                            <div id="diff-nav-controls" class="flex items-center space-x-1 border-l dark:border-gray-600 pl-4">
                                <button onclick="jumpDiff(-1)" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded transition">▲</button>
                                <span id="diff-nav-text" class="text-[10px] font-mono min-w-[40px] text-center text-gray-500"></span>
                                <button onclick="jumpDiff(1)" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded transition">▼</button>
                            </div>
                        </div>
                    </div>
                    <div id="result-unified" class="p-6 whitespace-pre-wrap font-mono text-[14px] leading-relaxed overflow-auto max-h-[600px] bg-white dark:bg-gray-900"></div>
                </div>
            </main>

            <!-- ===== サイドバー (PC用広告) ===== -->
            <aside class="hidden lg:block lg:w-80 flex-shrink-0">
                <div class="sticky top-24 space-y-6">
                    <div class="text-center">
                        <div class="admax-ads" data-admax-id="94ad7c62ffd8d5aead85cad7709ba4c4" style="display:inline-block;"></div>
                        <script type="text/javascript">(admaxads = window.admaxads ||[]).push({admax_id: "94ad7c62ffd8d5aead85cad7709ba4c4",type: "banner"});</script>
                        <script type="text/javascript" charset="utf-8" src="https://adm.shinobi.jp/st/t.js" async></script>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    
    <!-- 広告枠（下部） -->
    <div class="max-w-7xl mx-auto px-4 py-6 text-center min-h-[120px] flex justify-center items-center">
        <div class="admax-ads" data-admax-id="4e134db76dfe83bcd8b532c56c35b40b" style="display:inline-block;"></div>
        <script type="text/javascript">(admaxads = window.admaxads ||[]).push({admax_id: "4e134db76dfe83bcd8b532c56c35b40b",type: "banner"});</script>
        <script type="text/javascript" charset="utf-8" src="https://adm.shinobi.jp/st/t.js" async></script>
    </div>

    <footer class="mt-16 bg-white dark:bg-gray-800 border-t dark:border-gray-700 py-12">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="md:col-span-1">
                <h3 class="font-bold mb-4 text-gray-800 dark:text-gray-100">セキュリティ・プライバシー</h3>
                <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">入力されたテキストやファイルはサーバーへ送信されません。全ての比較処理はあなたのブラウザ内で完結するため、機密情報も安全にご利用いただけます。</p>
            </div>
            <div class="md:col-span-1">
                 <h3 class="font-bold mb-4 text-gray-800 dark:text-gray-100">ツールの仕様</h3>
                 <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">「単語単位」は英語等のスペース区切り言語に最適化されています。日本語の文章比較には「文字単位」を推奨します。</p>
            </div>
            <div class="md:col-span-1">
                <h3 class="font-bold mb-4 text-gray-800 dark:text-gray-100">フィードバック</h3>
                <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-3 leading-relaxed">開発者: AppLab_K (@AppLab_K)<br>バグ報告や機能要望は、以下のボタンで定型文をコピーし、開かれたDMに貼り付けてご連絡ください。</p>
                    <button onclick="openDmWithCopy(this)" class="inline-flex items-center justify-center w-full px-4 py-2 bg-blue-500 text-white text-sm font-bold rounded-lg hover:bg-blue-600 transition-all shadow-md active:scale-[0.98]">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"></path></svg>
                        定型文をコピーしてDMを開く
                    </button>
                </div>
            </div>
        </div>
        <div class="text-center mt-12 text-[10px] text-gray-400">
            &copy; <script>document.write(new Date().getFullYear());</script> AppLab_K.
        </div>
    </footer>

    <script>
        // DOM要素キャッシュ
        const originalEl = document.getElementById('original');
        const modifiedEl = document.getElementById('modified');
        const countOriginalEl = document.getElementById('count-original');
        const countModifiedEl = document.getElementById('count-modified');
        const resultContainerEl = document.getElementById('result-container');
        const autoSyncStatusEl = document.getElementById('auto-sync-status');
        const diffUnitEl = document.getElementById('diff-unit');
        const diffSpaceEl = document.getElementById('diff-space');
        const resultUnifiedEl = document.getElementById('result-unified');
        const badgeRemovedEl = document.getElementById('badge-removed');
        const badgeAddedEl = document.getElementById('badge-added');
        const diffNavControlsEl = document.getElementById('diff-nav-controls');
        const diffNavTextEl = document.getElementById('diff-nav-text');
        
        const AUTO_COMPARE_THRESHOLD = 50000;
        const MANUAL_COMPARE_THRESHOLD = 100000;
        
        let diffElements =[];
        let currentDiffIndex = -1;
        let debounceTimer = null;
        
        // PDF.js worker
        try { if(window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'; } 
        catch(e) { console.error(e); }

        const escapeMap = { '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' };
        function escapeHTML(text) { return String(text ?? "").replace(/[&<>'"]/g, c => escapeMap[c]); }
        
        function toggleDarkMode(){
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.theme = isDark ? "dark" : "light";
        }
        
        function updateCounts() {
            const valOrg = originalEl.value;
            const valMod = modifiedEl.value;
            countOriginalEl.innerText = `${valOrg.length.toLocaleString()} 文字`;
            countModifiedEl.innerText = `${valMod.length.toLocaleString()} 文字`;
            return valOrg.length + valMod.length;
        }

        function updateAutoCompareStatus() {
            if (resultContainerEl.classList.contains("hidden")) {
                autoSyncStatusEl.classList.add("hidden");
                return;
            }
            const total = originalEl.value.length + modifiedEl.value.length;
            if (total > AUTO_COMPARE_THRESHOLD) {
                autoSyncStatusEl.innerHTML = "● 自動比較OFF (文字数過多)";
                autoSyncStatusEl.className = "ml-3 text-[10px] bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400 px-2 py-0.5 rounded-full font-normal";
            } else {
                autoSyncStatusEl.innerHTML = "● 自動比較ON";
                autoSyncStatusEl.className = "ml-3 text-[10px] bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-0.5 rounded-full font-normal";
            }
            autoSyncStatusEl.classList.remove("hidden");
        }
        
        function autoCompare() {
            const total = updateCounts();
            clearTimeout(debounceTimer);
            updateAutoCompareStatus();
            if (total <= AUTO_COMPARE_THRESHOLD) {
                debounceTimer = setTimeout(() => compareText(true), 800);
            }
        }

        function clearText() {
            originalEl.value = "";
            modifiedEl.value = "";
            updateCounts();
            resultContainerEl.classList.add("hidden");
            autoSyncStatusEl.classList.add("hidden");
            diffElements =[];
            currentDiffIndex = -1;
        }

        function swapText() {
            [originalEl.value, modifiedEl.value] = [modifiedEl.value, originalEl.value];
            updateCounts();
            compareText(false);
        }

        function compareText(isAuto = false) {
            let original = originalEl.value.replace(/\r\n|\r/g, "\n");
            let modified = modifiedEl.value.replace(/\r\n|\r/g, "\n");
            
            if (!original.trim() && !modified.trim()) {
                resultContainerEl.classList.add("hidden");
                return;
            }

            if (original.length + modified.length > MANUAL_COMPARE_THRESHOLD) {
                if (!isAuto) alert(`合計${MANUAL_COMPARE_THRESHOLD.toLocaleString()}文字以内にして下さい`);
                return;
            }

            const unit = diffUnitEl.value;
            const includeSpace = diffSpaceEl.checked;
            let diffs;

            if (unit === "lines") diffs = Diff.diffLines(original, modified);
            else if (unit === "words") diffs = includeSpace ? Diff.diffWordsWithSpace(original, modified) : Diff.diffWords(original, modified);
            else diffs = Diff.diffChars(original, modified);

            const fragment = document.createDocumentFragment();
            let remCount = 0, addCount = 0;

            diffs.forEach((part) => {
                const span = document.createElement('span');
                let count = 0;
                if (unit === "lines") count = (part.value.match(/\n/g) || [1]).length;
                else if (unit === "words") count = (part.value.match(/\S+/g) || []).length;
                else count = part.value.length;

                if (part.added) { span.className = 'diff-added diff-target'; addCount += count; } 
                else if (part.removed) { span.className = 'diff-removed diff-target'; remCount += count; }
                
                span.innerHTML = escapeHTML(part.value);
                fragment.appendChild(span);
            });
            
            resultUnifiedEl.innerHTML = '';
            resultUnifiedEl.appendChild(fragment);
            const unitLabel = { chars: "文字", words: "単語", lines: "行" }[unit];
            badgeRemovedEl.innerText = `削除: -${remCount.toLocaleString()} ${unitLabel}`;
            badgeAddedEl.innerText = `追加: +${addCount.toLocaleString()} ${unitLabel}`;
            
            diffElements = Array.from(resultUnifiedEl.querySelectorAll(".diff-target"));
            
            if (diffElements.length > 0) {
                currentDiffIndex = 0;
                diffNavTextEl.innerText = `1 / ${diffElements.length}`;
            } else {
                currentDiffIndex = -1;
                diffNavTextEl.innerText = `0 / 0`;
            }
            
            resultContainerEl.classList.remove("hidden");
            updateAutoCompareStatus();
            if (!isAuto) resultContainerEl.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function jumpDiff(dir) {
            if (diffElements.length === 0) return;
            if (currentDiffIndex >= 0) diffElements[currentDiffIndex].classList.remove("diff-focus");
            currentDiffIndex = (currentDiffIndex + dir + diffElements.length) % diffElements.length;
            const el = diffElements[currentDiffIndex];
            el.classList.add("diff-focus");
            el.scrollIntoView({ behavior: "smooth", block: "center" });
            diffNavTextEl.innerText = `${currentDiffIndex + 1} / ${diffElements.length}`;
        }

        async function processFile(file, targetId) {
            const targetEl = (targetId === 'original') ? originalEl : modifiedEl;
            try {
                targetEl.value = "読み込み中...";
                const name = file.name.toLowerCase();
                let text = "";
                if (name.endsWith(".txt") || name.endsWith(".csv") || name.endsWith(".md")) {
                    text = await file.text();
                } else if (name.endsWith(".docx")) {
                    const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                    text = result.value;
                } else if (name.endsWith(".pdf")) {
                    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(it => it.str).join(" ") + "\n";
                    }
                } else {
                    throw new Error("非対応の形式です");
                }
                targetEl.value = text;
                updateCounts();
                compareText(true);
            } catch (e) {
                alert("エラー: " + e.message);
                targetEl.value = "";
            }
        }

        function handleFileInput(e, targetId) {
            if (e.target.files[0]) processFile(e.target.files[0], targetId);
            e.target.value = ""; 
        }

        // === DM送信機能 (ユーザーID指定形式) ===
        function openDmWithCopy(btn) {
            const textToCopy = "【テキスト差分比較ツールへのメッセージ】\n";
            // ご指定のUser IDを使用したダイレクトリンク
            const dmUrl = "https://x.com/messages/compose?recipient_id=2032694737069838336";
            
            const showCopied = () => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<span class="flex items-center font-bold">✓ コピーしました</span>`;
                setTimeout(() => { btn.innerHTML = originalHtml; }, 3000);
                window.open(dmUrl, "_blank", "noopener,noreferrer");
            };
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(textToCopy).then(showCopied, () => {
                    window.open(dmUrl, "_blank");
                });
            } else {
                window.open(dmUrl, "_blank");
            }
        }

        function handleDiffUnitChange() {
            diffSpaceEl.disabled = (diffUnitEl.value !== 'chars');
            if(diffUnitEl.value !== 'chars') diffSpaceEl.checked = false;
            compareText(true);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            originalEl.addEventListener("input", autoCompare);
            modifiedEl.addEventListener("input", autoCompare);
            updateCounts();
        });
    </script>
</body>
</html>
